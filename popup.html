<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="bg-orb" aria-hidden="true"></div>
    <div class="bg-noise" aria-hidden="true"></div>

    <header>
      <div class="brand">
        <span class="wordmark">PANTERO<em>IA</em></span>
        <span class="brand-sub">afiliar rápido</span>
      </div>
      <span id="status-dot" class="dot" title="Conectado ao Pantero"></span>
    </header>

    <main id="app">
      <!-- LOADING: skeleton -->
      <section id="loading" class="estado" aria-busy="true">
        <div class="skel skel-img shimmer"></div>
        <div class="skel skel-line w-80 shimmer"></div>
        <div class="skel skel-line w-45 shimmer"></div>
        <div class="skel skel-block shimmer"></div>
        <p class="loading-hint">Gerando link de afiliado…</p>
      </section>

      <!-- ERRO -->
      <section id="erro" class="estado hidden">
        <svg class="err-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/><path d="M12 8v4.5" stroke-linecap="round"/><circle cx="12" cy="16" r=".6" fill="currentColor" stroke="none"/>
        </svg>
        <p id="erro-msg">Algo deu errado.</p>
        <button id="tentar" class="btn ghost">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M3 12a9 9 0 1 0 2.6-6.4M3 4v5h5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Tentar de novo
        </button>
      </section>

      <!-- RESULTADO -->
      <section id="resultado" class="hidden">
        <div class="produto">
          <div class="foto-frame">
            <img id="foto" alt="Foto do produto" />
            <span id="plataforma" class="badge"></span>
          </div>
          <div class="produto-info">
            <h1 id="titulo" class="titulo"></h1>
            <div class="precos">
              <s id="preco-antigo" class="preco-antigo hidden"></s>
              <span id="preco" class="preco"></span>
            </div>
          </div>
        </div>

        <label class="label" for="mensagem">Mensagem pronta</label>
        <textarea id="mensagem" rows="7" spellcheck="false"></textarea>

        <button id="copiar" class="btn primary">
          <svg class="ic-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V6a2 2 0 0 1 2-2h9" stroke-linecap="round"/></svg>
          <svg class="ic-check hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M4 12.5l5 5L20 6.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span id="copiar-label">Copiar mensagem</span>
        </button>

        <div class="acoes-sec">
          <button id="baixar" class="btn ghost hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M12 4v11m0 0l-4-4m4 4l4-4M5 19h14" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Imagem
          </button>
          <button id="whatsapp" class="btn ghost">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2zm0 18.2c-1.5 0-3-.4-4.3-1.2l-.3-.2-3 .8.8-2.9-.2-.3A8.2 8.2 0 1 1 12 20.2zm4.5-6.1c-.2-.1-1.5-.7-1.7-.8-.2-.1-.4-.1-.6.1-.2.2-.6.8-.8 1-.1.2-.3.2-.5.1a6.7 6.7 0 0 1-3.4-3c-.3-.4 0-.5.2-.7l.4-.5c.1-.2.2-.3.3-.5v-.5c0-.1-.6-1.4-.8-1.9-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.9.9-1.2 2-.9 3.2.5 1.7 1.5 3.2 2.9 4.4 1.9 1.6 4 2.4 5.1 2.1 1-.2 1.8-.9 2-1.7.1-.4.1-.8 0-.9-.1-.2-.2-.2-.4-.3z"/></svg>
            WhatsApp
          </button>
        </div>
      </section>
    </main>
  </body>
  <script src="popup.js"></script>
</html>
